name: axm-certify-tests

# Tests the recognizer + fail-closed certificate emitter (`axm certify`).
# Pure Python, no Lean toolchain — fast. The emitted Lean is kernel-checked
# separately by the lean-pkpd-flagship workflow.

on:
  push:
    paths:
      - "axm/**"
      - "tests/**"
      - "examples/**"
      - "tools/**"
      - "docs/site_data.js"
      - ".github/workflows/python.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --quiet pytest
      - name: Run tests (incl. emitter == committed-artifact byte check)
        run: python -m pytest tests/ -q
      - name: Re-emit example and confirm it matches the committed certificate
        run: |
          python -m axm certify examples/drugX_infusion.json --lean-only > /tmp/regen.lean
          diff -u lean/BioPKPD/CertExample.lean /tmp/regen.lean
          echo "axm certify emits exactly the kernel-checked artifact"
      - name: Re-emit repeated-dose example and confirm it matches the committed cert
        run: |
          python -m axm certify examples/drugY_repeated.json --lean-only > /tmp/regen_r.lean
          diff -u lean/BioPKPD/CertExampleRepeated.lean /tmp/regen_r.lean
          echo "axm certify emits exactly the kernel-checked repeated-dose artifact"
      - name: Re-emit two-compartment example and confirm it matches the committed cert
        run: |
          python -m axm certify examples/drugW_two_compartment.json --lean-only > /tmp/regen_2c.lean
          diff -u lean/BioPKPD/CertExampleTwoCompartment.lean /tmp/regen_2c.lean
          echo "axm certify emits exactly the kernel-checked two-compartment artifact"
      - name: Re-render reports and confirm they match the committed reports
        run: |
          for s in drugX_infusion drugY_repeated drugW_two_compartment; do
            python -m axm report "examples/$s.json" > "/tmp/$s.md"
            diff -u "examples/$s.report.md" "/tmp/$s.md"
          done
          echo "axm report renders exactly the committed MIDD reports"
      - name: Confirm each report's proof-identity hash matches its artifact
        run: |
          for pair in "lean/BioPKPD/CertExample.lean:examples/drugX_infusion.report.md" \
                      "lean/BioPKPD/CertExampleRepeated.lean:examples/drugY_repeated.report.md" \
                      "lean/BioPKPD/CertExampleTwoCompartment.lean:examples/drugW_two_compartment.report.md"; do
            art="${pair%%:*}"; rep="${pair##*:}"
            want=$(sha256sum "$art" | cut -d' ' -f1)
            grep -q "$want" "$rep"
            echo "report proof-identity hash == sha256($art): $want"
          done
      - name: Re-render fail-closed reports and confirm they match (exit codes 2/3)
        run: |
          python -m axm report examples/failed_infusion.json > /tmp/f.md || true
          diff -u examples/failed_infusion.report.md /tmp/f.md
          python -m axm report examples/refused_three_compartment.json > /tmp/r.md || true
          diff -u examples/refused_three_compartment.report.md /tmp/r.md
          echo "fail-closed reports render exactly the committed artifacts"
      - name: Confirm the fail-closed exit-code contract
        run: |
          set +e
          python -m axm certify examples/drugX_infusion.json            >/dev/null 2>&1; test $? -eq 0
          python -m axm certify examples/drugY_repeated.json            >/dev/null 2>&1; test $? -eq 0
          python -m axm certify examples/drugW_two_compartment.json     >/dev/null 2>&1; test $? -eq 0
          python -m axm certify examples/failed_infusion.json           >/dev/null 2>&1; test $? -eq 2
          python -m axm certify examples/refused_three_compartment.json >/dev/null 2>&1; test $? -eq 3
          echo "exit codes: 0 certified, 2 failed (in-subset finding), 3 refused (out of subset)"
      - name: Confirm the browser-demo bundle matches the package source
        run: |
          python tools/build_site.py --check
          echo "docs/site_data.js is byte-identical to the tested package + examples"
