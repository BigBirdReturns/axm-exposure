name: deploy-pages

# Publishes the browser demo (docs/) to GitHub Pages. The demo runs the real
# `axm` package under Pyodide; docs/site_data.js is regenerated + diffed by the
# python workflow, so what's published is byte-identical to the tested tool.
#
# One-time setup: repo Settings → Pages → Source = "GitHub Actions".

on:
  push:
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify the bundled demo source is in sync with the package
        run: python3 tools/build_site.py --check
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
